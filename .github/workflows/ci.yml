name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: go build -o /dev/null ./cmd/mio
        if: runner.os != 'Windows'

      - name: Build (Windows)
        run: go build -o NUL ./cmd/mio
        if: runner.os == 'Windows'

      - name: Test
        run: go test ./...
