version: 2

project_name: mio

before:
  hooks:
    - go mod tidy

builds:
  - id: mio
    main: ./cmd/mio
    binary: mio
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - protocols/*
      - skills/**/*
      - statusline.sh
      - output-styles/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Yarov
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Yarov/mio"
    description: "Persistent memory for AI coding agents"
    license: "MIT"
    install: |
      bin.install "mio"
    test: |
      system "#{bin}/mio", "version"
    post_install: |
      ohai "Run 'mio setup' to configure your AI agent"

release:
  github:
    owner: Yarov
    name: mio
  name_template: "v{{.Version}}"
  header: |
    ## Mio v{{.Version}}

    Persistent memory for AI coding agents.

    ### Install

    ```bash
    # macOS / Linux
    curl -fsSL https://raw.githubusercontent.com/Yarov/mio/main/install.sh | sh

    # Homebrew
    brew install yarov/tap/mio

    # Windows (PowerShell)
    irm https://raw.githubusercontent.com/Yarov/mio/main/install.ps1 | iex
    ```

    After install, run `mio setup` to configure your agent.
